<footer class="bg-surface-base border-t border-surface-border">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3 select-none">
      <span class="text-sm text-content-primary">{{ app.name }}</span>
      <span class="text-surface-border">/</span>
      <span class="text-xs text-content-muted font-medium">v{{ app.version }}</span>
    </div>

    <div class="flex items-center gap-3">
      @for (social of socials; track $index) {
      <a
        title="social link"
        [href]="social.to"
        target="_blank"
        rel="noopener noreferrer"
        class="transition-colors"
        [class]="[social.color, social.hover]"
      >
        <app-icon [name]="social.icon" [filled]="true" extraClass="size-7" />
      </a>
      }
    </div>
  </div>
</footer>
