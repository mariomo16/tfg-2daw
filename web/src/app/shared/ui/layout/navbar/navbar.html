<nav
  class="fixed max-h-16 top-0 left-0 right-0 z-50 bg-surface-base/80 backdrop-blur-md border-b border-surface-border"
>
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a routerLink="/" class="text-lg text-content-primary flex items-center gap-4">
      <app-icon name="zcool" [filled]="true" extraClass="size-9" />
      <span class="font-game">{{ app.name }}</span>
    </a>

    <div class="flex items-center gap-6">
      <div class="flex items-center gap-3">
        <div class="flex items-center">
          <a
            routerLink="/pruebas"
            class="flex items-center gap-3 px-3 py-2 rounded-xs hover:bg-surface-card transition-colors"
          >
            <p class="text-sm font-medium text-content-primary truncate">Pruebas</p>
          </a>
        </div>

        @if (isLoading()) {
        <div class="flex items-center gap-2">
          <div class="h-9 w-16 bg-surface-border/50 rounded-xs animate-pulse"></div>
          <div class="h-9 w-24 bg-surface-border/50 rounded-xs animate-pulse"></div>
        </div>
        } @else if (isAuthenticated()) { @if (isStaff()) {
        <div class="flex items-center">
          <a
            routerLink="/admin/dashboard"
            class="flex items-center gap-3 px-3 py-2 rounded-xs hover:bg-surface-card transition-colors"
          >
            <p class="text-sm font-medium text-content-primary truncate">Panel de gestión</p>
          </a>
        </div>
        }

        <div class="flex items-center">
          <a
            routerLink="/new-reservation"
            class="flex items-center gap-3 min-w-0 px-3 py-2 rounded-xs hover:bg-surface-card transition-colors"
          >
            <p class="text-sm font-medium text-content-primary truncate">Reservar equipo</p>
          </a>
        </div>

        <div class="h-4 w-px bg-surface-border"></div>

        <app-auth-widget />
        } @else {
        <div class="flex items-center gap-2">
          <a
            routerLink="/auth/login"
            class="px-4 py-2 text-sm font-medium text-content-secondary hover:text-content-primary"
          >
            Entrar
          </a>
          <a
            routerLink="/auth/register"
            class="px-4 py-2 text-sm font-medium text-surface-base bg-content-primary hover:bg-zinc-200 rounded-xs"
          >
            Empezar
          </a>
        </div>
        }
      </div>
    </div>
  </div>
</nav>
