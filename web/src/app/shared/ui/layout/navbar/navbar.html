<nav
  class="fixed top-0 left-0 right-0 z-50 bg-[#09090b]/80 backdrop-blur-md border-b border-zinc-800"
>
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a routerLink="/" class="text-lg text-zinc-100">
      <span class="font-game">{{ app.name }}</span>
    </a>

    <div class="flex items-center gap-6">
      <div class="flex items-center gap-3">
        @if (isAuthenticated()) {
          <a
            routerLink="/admin/dashboard"
            class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-zinc-100"
          >
            Backoffice
          </a>

          <div class="h-4 w-px bg-zinc-800"></div>

          <div class="flex items-center gap-2">
            <span class="px-4 py-2 text-sm font-medium text-zinc-100">
              {{ user()?.name }}
            </span>
            <button
              type="button"
              (click)="onLogout()"
              class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-zinc-100"
            >
              Salir
            </button>
          </div>
        } @else {
          <div class="flex items-center gap-2">
            <a
              routerLink="/auth/login"
              class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-zinc-100"
            >
              Entrar
            </a>
            <a
              routerLink="/auth/register"
              class="px-4 py-2 text-sm font-medium text-zinc-900 bg-zinc-100 hover:bg-zinc-200 rounded-lg"
            >
              Empezar
            </a>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
