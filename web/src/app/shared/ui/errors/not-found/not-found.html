<section
  class="min-h-screen flex items-center justify-center bg-[#09090b] px-6 py-24 relative overflow-hidden"
>
  <div class="relative z-10 text-center max-w-xl">
    <h1
      class="font-game text-7xl sm:text-8xl md:text-9xl text-zinc-100 mb-8 tracking-tighter opacity-80 uppercase"
    >
      404
    </h1>

    <div class="space-y-6">
      <h2 class="text-2xl sm:text-3xl font-bold text-zinc-100 tracking-tight">
        Página no encontrada
      </h2>
      <p class="text-zinc-500 text-base sm:text-lg leading-relaxed max-w-xl mx-auto">
        Lo sentimos, la página que buscas no existe.
      </p>

      <div class="pt-8 flex flex-col sm:flex-row items-center justify-center gap-4">
        <a
          routerLink="/"
          class="w-full sm:w-auto px-8 py-4 text-sm font-bold text-zinc-900 bg-zinc-100 rounded-2xl hover:bg-zinc-200 transition-all flex items-center justify-center gap-2"
        >
          Volver al inicio
        </a>
        <button
          type="button"
          (click)="goBack()"
          class="w-full sm:w-auto px-8 py-4 text-sm font-bold text-zinc-400 bg-zinc-900 border border-zinc-800 rounded-2xl hover:bg-zinc-800 transition-all flex items-center justify-center gap-2 cursor-pointer"
        >
          Regresar
        </button>
      </div>
    </div>

    <div class="mt-20 opacity-20 select-none">
      <span class="font-game text-xs text-zinc-100">{{ appName }} /></span>
    </div>
  </div>
</section>
