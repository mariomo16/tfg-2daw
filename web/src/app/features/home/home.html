<app-navbar />

<section class="w-screen h-screen items-center text-center text-content-primary">
  <img
    src="https://images.igdb.com/igdb/image/upload/t_original/scsvjv.jpg"
    alt="Hero background"
    class="opacity-40 absolute h-full object-cover object-center top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 z-0 background"
  />
  <main class="flex flex-col relative z-1 h-full w-full items-center">
    <div class="flex flex-col justify-center h-128">
      <h1 class="font-diablo-heavy text-8xl tracking-tighter uppercase">Domina la partida</h1>
      <p class="text-2xl font-diablo-light text-content-secondary uppercase">
        Aunque lo importante sea participar... o no.
      </p>
    </div>
    <div class="flex gap-4">
      <app-gaming-button label="VER ZONAS" href="#zones" [useRouterLink]="false" />
      <app-gaming-button label="REGISTRARSE" href="/register" />
    </div>
  </main>
</section>

<section
  id="zones"
  class="w-screen h-screen flex flex-col gap-7 items-center text-center text-content-primary"
>
  <header>
    <h1 class="mt-7 text-6xl font-diablo">ZONAS GAMING</h1>
    <p class="text-lg text-content-secondary">
      Desde jugar con tus amigos, entrenar como los mejores, o realizar tus propios streams, tu
      eliges
    </p>
  </header>

  <main class="flex gap-4 text-left">
    @for (zone of zones; track $index) {
      <div class="max-w-2xs shrink-0">
        <img
          [src]="zone.image"
          alt="Imagen de la zona"
          class="w-2xs select-none opacity-80 hover:opacity-100 transition-opacity duration-150"
        />
        <h2 class="mt-2 text-4xl font-diablo text-primary-light">{{ zone.name }}</h2>
        <p>{{ zone.description }}</p>
      </div>
    }
  </main>
  <app-gaming-button label="VER PRECIOS" [asLink]="true" class="mt-8" />
</section>

<app-footer />
