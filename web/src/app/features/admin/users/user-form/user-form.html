<div class="max-w-400 mx-auto p-8 space-y-8">
  <div class="mb-2">
    <h1 class="text-3xl font-bold text-content-primary tracking-tight">
      {{ isEditing ? 'Editar usuario' : 'Nuevo usuario' }}
    </h1>
    <p class="mt-2 text-content-muted">
      {{ isEditing ? 'Modifica los datos del usuario' : 'Crea un nuevo usuario en el sistema' }}
    </p>
  </div>

  <section class="bg-surface-card/30 border border-surface-border rounded-md p-6 max-w-2xl">
    @if (isLoadingData()) {
    <p class="text-primary animate-pulse flex justify-center">Cargando...</p>
    } @else {
    <form class="space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label for="user-name" class="block text-sm font-medium text-content-secondary mb-2">
          Nombre
        </label>
        <input
          id="user-name"
          name="user-name"
          type="text"
          placeholder="Nombre completo"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          formControlName="name"
        />
      </div>

      <div>
        <label for="user-email" class="block text-sm font-medium text-zinc-300 mb-2">
          Correo electrónico
        </label>
        <input
          id="user-email"
          name="user-email"
          type="email"
          placeholder="usuario@email.com"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          formControlName="email"
        />
      </div>

      <div>
        <label for="user-role" class="block text-sm font-medium text-content-secondary mb-2">
          Rol
        </label>
        <select
          id="user-role"
          name="user-role"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          formControlName="role"
        >
          <option value="client">Cliente</option>
          <option value="employee">Empleado</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <div>
        <label for="user-balance" class="block text-sm font-medium text-zinc-300 mb-2">
          Saldo (€)
        </label>
        <input
          id="user-balance"
          name="user-balance"
          type="number"
          step="0.01"
          placeholder="0.00"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          formControlName="balance"
        />
      </div>

      <div>
        <label for="user-password" class="block text-sm font-medium text-zinc-300 mb-2">
          Contraseña @if (isEditing) {
          <span class="text-zinc-500 font-normal ml-1">(dejar vacío para no cambiar)</span>
          }
        </label>
        <input
          id="user-password"
          name="user-password"
          type="password"
          placeholder="Mínimo 8 caracteres"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          formControlName="password"
        />
      </div>

      <div>
        <label for="image" class="block text-sm font-medium text-zinc-300 mb-2">
          Imagen de perfil
        </label>
        <input
          id="image"
          name="image"
          type="file"
          accept="image/*"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          (change)="onImageChange($event)"
        />
      </div>

      <div class="flex items-center gap-3 pt-6 border-t border-surface-border mt-6">
        <button
          type="submit"
          class="px-4 py-2 text-sm font-medium text-zinc-900 bg-content-primary hover:bg-zinc-200 rounded-md transition-colors cursor-pointer"
        >
          {{ isEditing ? 'Guardar cambios' : 'Crear usuario' }}
        </button>
        <a
          routerLink="/admin/users"
          class="px-4 py-2 text-sm font-medium text-content-muted hover:text-content-primary transition-colors cursor-pointer"
        >
          Cancelar
        </a>
      </div>
    </form>
    }
  </section>
</div>
