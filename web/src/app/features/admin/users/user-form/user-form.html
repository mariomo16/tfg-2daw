<div class="max-w-[1600px] mx-auto p-8 space-y-8">
  <div class="mb-2">
    <a
      routerLink="/admin/users"
      class="inline-flex items-center gap-1.5 text-sm text-zinc-500 hover:text-zinc-300 transition-colors mb-4 cursor-pointer"
    >
      <app-icon name="arrow-back" />
      Volver a usuarios
    </a>
    <h1 class="text-3xl font-bold text-zinc-100 tracking-tight">
      {{ isEditing() ? 'Editar usuario' : 'Nuevo usuario' }}
    </h1>
    <p class="mt-2 text-zinc-500">
      {{ isEditing() ? 'Modifica los datos del usuario' : 'Crea un nuevo usuario en el sistema' }}
    </p>
  </div>

  <section class="bg-zinc-900/30 border border-zinc-800 rounded-md p-6 max-w-2xl">
    @if (userResource.isLoading()) {
      <div class="flex justify-center py-12 text-zinc-500">
        <span [innerHTML]="loadingIcon | safeHtml"></span>
      </div>
    } @else {
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        <div>
          <label for="user-name" class="block text-sm font-medium text-zinc-300 mb-2">
            Nombre
          </label>
          <input
            id="user-name"
            name="user-name"
            type="text"
            placeholder="Nombre completo"
            class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
          />
        </div>

        <div>
          <label for="user-email" class="block text-sm font-medium text-zinc-300 mb-2">
            Correo electrónico
          </label>
          <input
            id="user-email"
            name="user-email"
            type="email"
            placeholder="usuario@email.com"
            class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
          />
        </div>

        <div>
          <label for="user-role" class="block text-sm font-medium text-zinc-300 mb-2"> Rol </label>
          <select
            id="user-role"
            name="user-role"
            class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            [ngModel]="role()"
            (ngModelChange)="role.set($event)"
          >
            <option value="">Selecciona un rol</option>
            <option value="client">Cliente</option>
            <option value="employee">Empleado</option>
            <option value="admin">Administrador</option>
          </select>
        </div>

        <div>
          <label for="user-balance" class="block text-sm font-medium text-zinc-300 mb-2">
            Saldo (€)
          </label>
          <input
            id="user-balance"
            name="user-balance"
            type="number"
            step="0.01"
            placeholder="0.00"
            class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            [ngModel]="balance()"
            (ngModelChange)="balance.set($event)"
          />
        </div>

        <div>
          <label for="user-password" class="block text-sm font-medium text-zinc-300 mb-2">
            Contraseña
            @if (isEditing()) {
              <span class="text-zinc-500 font-normal ml-1">(dejar vacío para no cambiar)</span>
            }
          </label>
          <input
            id="user-password"
            name="user-password"
            type="password"
            placeholder="Mínimo 8 caracteres"
            class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
          />
        </div>

        <div class="flex items-center gap-3 pt-6 border-t border-zinc-800 mt-6">
          <button
            type="submit"
            (click)="onSubmit()"
            class="px-4 py-2 text-sm font-medium text-zinc-900 bg-zinc-100 hover:bg-zinc-200 rounded-md transition-colors cursor-pointer"
          >
            {{ isEditing() ? 'Guardar cambios' : 'Crear usuario' }}
          </button>
          <a
            routerLink="/admin/users"
            class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-zinc-100 transition-colors cursor-pointer"
          >
            Cancelar
          </a>
        </div>
      </form>
    }
  </section>
</div>
