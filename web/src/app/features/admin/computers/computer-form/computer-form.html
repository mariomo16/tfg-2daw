<div class="max-w-400 mx-auto p-8 space-y-8">
  <div class="mb-2">
    <h1 class="text-3xl font-bold text-zinc-100 tracking-tight">
      {{ isEditing ? 'Editar ordenador' : 'Nuevo ordenador' }}
    </h1>
    <p class="mt-2 text-zinc-500">
      {{ isEditing ? 'Modifica los datos del equipo' : 'Añade un nuevo equipo al local' }}
    </p>
  </div>

  <section class="bg-surface-card/30 border border-surface-border rounded-md p-6 max-w-2xl">
    @if (isLoadingData()) {
    <p class="text-primary animate-pulse flex justify-center">Cargando...</p>
    } @else {
    <form class="space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label for="computer-name" class="block text-sm font-medium text-zinc-300 mb-2">
          Nombre
        </label>
        <input
          id="computer-name"
          type="text"
          placeholder="Ej: PC-G05"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          formControlName="name"
          name="computer-name"
        />
      </div>

      <div>
        <label for="computer-zone" class="block text-sm font-medium text-zinc-300 mb-2">
          Zona
        </label>
        <select
          id="computer-zone"
          class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          name="computer-zone"
          formControlName="zoneId"
        >
          <option value="0">Selecciona una zona</option>
          @for (zone of zonesResource.value(); track zone.id) {
          <option [value]="zone.id">{{ zone.name }}</option>
          }
        </select>
      </div>

      @if (isEditing) {
      <div>
        <label for="computer-status" class="block text-sm font-medium text-zinc-300 mb-2">
          Estado
        </label>
        <select
          id="computer-status"
          class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          name="computer-status"
          formControlName="status"
        >
          <option value="available">Disponible</option>
          <option value="maintenance">Mantenimiento</option>
          <option value="occupied">Ocupado</option>
        </select>
      </div>
      }

      <div>
        <label for="computer-specs" class="block text-sm font-medium text-zinc-300 mb-2">
          Especificaciones
        </label>
        <textarea
          id="computer-specs"
          rows="3"
          placeholder="Ej: RTX 4070, i7-14700K, 32GB RAM"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors min-h-25"
          name="computer-specs"
          formControlName="specs"
        ></textarea>
      </div>

      <div class="flex items-center gap-3 pt-6 border-t border-surface-border mt-6">
        <button
          type="submit"
          class="px-4 py-2 text-sm font-medium text-surface-base bg-content-primary hover:bg-zinc-200 rounded-md transition-colors cursor-pointer"
        >
          {{ isEditing ? 'Guardar cambios' : 'Crear ordenador' }}
        </button>
        <a
          routerLink="/admin/computers"
          class="px-4 py-2 text-sm font-medium text-content-muted hover:text-content-primary transition-colors cursor-pointer"
        >
          Cancelar
        </a>
      </div>
    </form>
    }
  </section>
</div>
