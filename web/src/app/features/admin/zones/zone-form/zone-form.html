<div class="max-w-400 mx-auto p-8 space-y-8">
  <div class="mb-2">
    <h1 class="text-3xl font-bold text-zinc-100 tracking-tight">
      {{ isEditing ? 'Editar zona' : 'Nueva zona' }}
    </h1>
    <p class="mt-2 text-zinc-500">
      {{ isEditing ? 'Modifica los datos de la zona' : 'Crea una nueva zona para el local' }}
    </p>
  </div>

  <section class="bg-surface-card/30 border border-surface-border rounded-md p-6 max-w-2xl">
    @if (isLoadingData()) {
      <app-loading-state />
    } @else {
      <form class="space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div>
          <label for="zone-name" class="block text-sm font-medium text-zinc-300 mb-2">
            Nombre
          </label>
          <input
            id="zone-name"
            type="text"
            placeholder="Ej: Standard"
            class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            name="zone-name"
            formControlName="name"
          />
        </div>

        <div>
          <label for="zone-price" class="block text-sm font-medium text-zinc-300 mb-2">
            Creditos
          </label>
          <input
            id="zone-price"
            type="number"
            step="0.01"
            placeholder="3.50"
            class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            formControlName="pricePerSlot"
            name="zone-price"
          />
        </div>

        <div>
          <label for="zone-description" class="block text-sm font-medium text-zinc-300 mb-2">
            Descripcion
          </label>
          <textarea
            id="zone-description"
            type="text"
            class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            name="zone-description"
            formControlName="description"
          >
          </textarea>
        </div>

        <div>
          <label for="zone-coverImage" class="block text-sm font-medium text-zinc-300 mb-2">
            Imagen (URL)
          </label>
          <input
            id="zone-coverImage"
            type="text"
            class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            name="zone-coverImage"
            formControlName="coverImage"
          />
        </div>

        <div class="flex items-center gap-3 pt-6 border-t border-surface-border mt-6">
          <button
            type="submit"
            class="px-4 py-2 text-sm font-medium text-surface-base bg-content-primary hover:bg-zinc-200 rounded-md transition-colors cursor-pointer"
          >
            {{ isEditing ? 'Guardar cambios' : 'Crear zona' }}
          </button>
          <a
            routerLink="/admin/zones"
            class="px-4 py-2 text-sm font-medium text-content-muted hover:text-content-primary transition-colors cursor-pointer"
          >
            Cancelar
          </a>
        </div>
      </form>
    }
  </section>
</div>
