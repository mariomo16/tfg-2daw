@if (notificationsResource.isLoading()) {
<app-loading-state />
} @else if (notificationsResource.error()) {
<app-error-state />
} @else {
<app-data-table
  title="Notificaciones"
  description="Gestiona las notificaciones enviadas a los usuarios"
  actionLabel="+ Nueva notificación"
  actionRoute="/admin/notifications/new"
  [columns]="columns"
  [actions]="actions"
  [isEmpty]="!notificationsResource.value()?.length"
>
  @for (notification of notificationsResource.value(); track notification.id) {
  <tr class="hover:bg-surface-card/30 transition-colors">
    <td class="px-6 py-4 text-sm font-medium text-content-primary">
      {{ notification.user.email }}
    </td>
    <td class="px-6 py-4 text-sm text-content-secondary">{{ notification.message }}</td>
    <td class="px-6 py-4 text-sm text-content-secondary">
      {{ notification.created_at | date: 'dd/MM/yyyy' }}
    </td>
    <td class="px-6 py-4 text-right">
      <a
        [routerLink]="['/admin/notifications', notification.id]"
        class="text-sm text-primary-light hover:text-primary transition-colors mr-3"
        >Ver detalles</a
      >
    </td>
  </tr>
  }
</app-data-table>
}
