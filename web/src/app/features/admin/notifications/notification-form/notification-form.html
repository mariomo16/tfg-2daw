<div class="max-w-400 mx-auto p-8 space-y-8">
  <div class="mb-2">
    <h1 class="text-3xl font-bold text-zinc-100 tracking-tight">Nueva notificación</h1>
    <p class="mt-2 text-zinc-500">Envía una nueva notificación a un usuario</p>
  </div>

  <section class="bg-surface-card/30 border border-surface-border rounded-md p-6 max-w-2xl">
    @if (isLoadingData()) {
    <p class="text-primary animate-pulse flex justify-center">Cargando...</p>
    } @else {
    <form class="space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label for="notification-user" class="block text-sm font-medium text-zinc-300 mb-2">
          Usuario
        </label>
        <select
          id="notification-user"
          class="w-full px-4 py-2 bg-zinc-900/50 border border-zinc-800 rounded-md text-sm text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          name="notification-user"
          formControlName="userId"
          required
        >
          <option value="0">Selecciona un usuario</option>
          @for (user of usersResource.value(); track user.id) {
          <option [value]="user.id">{{ user.name }} ({{ user.email }})</option>
          }
        </select>
      </div>

      <div>
        <label for="notification-message" class="block text-sm font-medium text-zinc-300 mb-2">
          Mensaje
        </label>
        <textarea
          id="notification-message"
          rows="4"
          placeholder="Escribe el mensaje de la notificación..."
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary placeholder-content-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors min-h-25"
          formControlName="message"
          name="notification-message"
          required
        ></textarea>
      </div>

      <div class="flex items-center gap-3 pt-6 border-t border-surface-border mt-6">
        <button
          type="submit"
          class="px-4 py-2 text-sm font-medium text-surface-base bg-content-primary hover:bg-zinc-200 rounded-md transition-colors cursor-pointer"
        >
          Enviar notificación
        </button>
        <a
          routerLink="/admin/notifications"
          class="px-4 py-2 text-sm font-medium text-content-muted hover:text-content-primary transition-colors cursor-pointer"
        >
          Cancelar
        </a>
      </div>
    </form>
    }
  </section>
</div>
