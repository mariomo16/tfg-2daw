<div class="max-w-400 mx-auto p-8 space-y-8">
  <div class="mb-2">
    <h1 class="text-3xl font-bold text-content-primary tracking-tight">
      {{ isEditing ? 'Editar franja horaria' : 'Nueva franja horaria' }}
    </h1>
    <p class="mt-2 text-content-muted">
      {{ isEditing ? 'Modifica el horario' : 'Define un nuevo horario disponible' }}
    </p>
  </div>

  <section class="bg-surface-card/30 border border-surface-border rounded-md p-6 max-w-2xl">
    @if (isLoadingData()) {
      <app-loading-state />
    } @else {
      <form class="space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              for="timeslot-start"
              class="block text-sm font-medium text-content-secondary mb-2"
            >
              Hora inicio
            </label>
            <input
              id="timeslot-start"
              name="timeslot-start"
              type="time"
              class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              formControlName="startTime"
            />
          </div>
          <div>
            <label for="timeslot-end" class="block text-sm font-medium text-content-secondary mb-2">
              Hora fin
            </label>
            <input
              id="timeslot-end"
              name="timeslot-end"
              type="time"
              class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-md text-sm text-content-primary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              formControlName="endTime"
            />
          </div>
        </div>

        <div class="flex items-center gap-3 pt-6 border-t border-surface-border mt-6">
          <button
            type="submit"
            class="px-4 py-2 text-sm font-medium text-surface-base bg-content-primary hover:bg-zinc-200 rounded-md transition-colors cursor-pointer"
          >
            {{ isEditing ? 'Guardar cambios' : 'Crear franja' }}
          </button>
          <a
            routerLink="/admin/timeslots"
            class="px-4 py-2 text-sm font-medium text-content-muted hover:text-content-primary transition-colors cursor-pointer"
          >
            Cancelar
          </a>
        </div>
      </form>
    }
  </section>
</div>
