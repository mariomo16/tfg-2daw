<div class="flex w-screen h-screen overflow-hidden text-zinc-400">
  <aside class="w-64 shrink-0 border-e border-zinc-800 bg-[#09090b] flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <span class="text-zinc-100 font-bold tracking-tight"
          ><a routerLink="/">{{ app.name }} </a>
          <span class="text-indigo-500">v{{ app.version }}</span></span
        >
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <p class="text-xs font-semibold text-zinc-500 uppercase tracking-widest px-3 mb-3">Menu</p>
      @for (item of navItems; track $index) {
        <a
          [routerLink]="item.routerLink"
          [routerLinkActive]="styles.navItemActive"
          [class]="styles.navItem"
        >
          <app-icon [name]="item.icon" />
          {{ item.name }}
        </a>
      }
    </nav>

    <div class="p-4 border-t border-zinc-800">
      <div class="flex items-center gap-3 p-2">
        <div class="size-8 rounded-full bg-linear-to-tr from-indigo-500 to-purple-500"></div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-zinc-100 truncate">{{ user()!.name }}</p>
          <p class="text-sm text-zinc-500 truncate">{{ user()!.role }}</p>
        </div>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header
      class="h-16 shrink-0 border-b border-zinc-800 bg-[#09090b]/80 backdrop-blur-md flex items-center justify-between px-8 z-10"
    >
      <div class="flex items-center gap-2 text-sm">
        <span class="text-zinc-500">admin</span>
        <span class="text-zinc-700">/</span>
        <span class="text-zinc-200 font-medium">Dashboard</span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto custom-scroll bg-[#09090b]">
      <router-outlet />
    </main>
  </div>
</div>
