<div class="flex w-screen h-screen overflow-hidden text-content-secondary">
  <aside class="w-64 shrink-0 border-e border-surface-border bg-surface-base flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-surface-border">
      <a routerLink="/" class="flex flex-col -space-y-1 group">
        <span
          class="text-content-primary font-black tracking-tight text-lg group-hover:text-primary transition-colors"
        >
          {{ app.name }}
        </span>
        <span class="text-[10px] font-medium text-content-muted uppercase tracking-widest">
          Version {{ app.version }}
        </span>
      </a>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      @for (item of navItems; track $index) {
      <a
        [routerLink]="item.routerLink"
        [routerLinkActive]="styles.navItemActive"
        [class]="styles.navItem"
      >
        <app-icon [name]="item.icon" />
        {{ item.name }}
      </a>
      }
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header
      class="h-16 shrink-0 border-b border-surface-border bg-surface-base/80 backdrop-blur-md flex items-center justify-between px-8 z-10"
    >
      <div class="flex items-center gap-2 text-sm">
        <span class="text-content-muted">admin</span>
        <span class="text-surface-border">/</span>
        <span class="text-content-secondary font-medium">{{ currentPathName() }}</span>
      </div>
      <app-auth-widget />
    </header>

    <main class="flex-1 overflow-y-scroll custom-scroll bg-surface-base">
      <router-outlet />
    </main>
  </div>
</div>
