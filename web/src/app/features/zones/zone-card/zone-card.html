<div
  class="bg-surface-card/30 rounded border border-surface-border/50 overflow-hidden flex flex-col h-full hover:border-surface-border/80 hover:bg-surface-card/50"
>
  @let currentZone = zone();

  <div class="h-1 shadow-sm" [style.background-color]="currentZone.accent"></div>

  <div class="p-5 flex flex-col h-full">
    <div class="flex items-start gap-4 mb-5">
      <div
        class="size-14 rounded-sm bg-surface-base/50 border border-surface-border/50 flex items-center justify-center text-3xl"
      >
        <app-icon
          [name]="currentZone.icon"
          extraClass="size-8"
          [filled]="true"
          [style.color]="currentZone.accent"
        />
      </div>
      <div>
        <h3 class="text-xl font-bold font-game text-content-primary mb-0.5">
          {{ currentZone.name }}
        </h3>
        <p class="text-xs font-semibold text-content-muted uppercase tracking-wider">
          Disponibles:
          <span class="text-content-secondary"
            >{{ currentZone.availableComputers }} / {{ currentZone.totalComputers }}</span
          >
        </p>
      </div>
    </div>

    <div class="flex items-baseline gap-1 mt-auto mb-6">
      <span class="text-2xl font-bold text-content-primary">
        {{ currentZone.price_per_slot | currency: 'EUR' : 'symbol' : '1.2-2' }}
      </span>
      <span class="text-xs font-medium text-content-muted uppercase">/ hora</span>
    </div>

    <a
      [routerLink]="['/zones', currentZone.id]"
      class="w-full py-2.5 text-sm font-bold text-content-secondary bg-surface-card/80 border border-surface-border rounded-xs hover:bg-surface-border hover:text-white transition-colors text-center"
    >
      Ver equipos
    </a>
  </div>
</div>
