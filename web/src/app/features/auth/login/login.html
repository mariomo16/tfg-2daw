<section
  class="relative min-h-screen flex items-center justify-center bg-[#09090b] overflow-hidden selection:bg-accent-blue/30"
>
  <div
    class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none"
    style="
      background-image: radial-gradient(#f1f5f9 1px, transparent 1px);
      background-size: 24px 24px;
    "
  ></div>

  <div class="relative z-10 w-full max-w-[400px] mx-4">
    <div
      class="border border-surface-600/20 bg-surface-800/40 backdrop-blur-xl rounded-2xl p-8 shadow-2xl shadow-black/50"
    >
      <div class="flex flex-col mb-8">
        <div class="flex items-center gap-6">
          <a
            routerLink="/"
            aria-label="Volver al inicio"
            class="flex items-center justify-center w-8 h-8 text-text-secondary hover:text-white transition-colors"
          >
            <app-icon name="arrow-left" extraClass="size-6" />
          </a>

          <h1 class="text-2xl font-bold text-text-primary tracking-tight">Bienvenido de nuevo</h1>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        @if (error()) {
          <div
            class="p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-sm text-red-500 font-medium"
          >
            {{ error() }}
          </div>
        }
        <div class="space-y-2">
          <label
            for="login-email"
            class="text-xs font-semibold text-text-secondary uppercase tracking-wider ml-1"
          >
            Correo electrónico
          </label>
          <div class="relative group">
            <input
              id="login-email"
              type="email"
              formControlName="email"
              placeholder="nombre@ejemplo.com"
              class="w-full px-4 py-3 bg-surface-900 border rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none transition-all"
              [class.border-red-500]="form.controls.email.invalid && form.controls.email.touched"
              [class.focus:border-red-500]="
                form.controls.email.invalid && form.controls.email.touched
              "
              [class.focus:ring-1]="form.controls.email.invalid && form.controls.email.touched"
              [class.focus:ring-red-500]="
                form.controls.email.invalid && form.controls.email.touched
              "
              [class.border-surface-600]="
                !form.controls.email.invalid || !form.controls.email.touched
              "
              [class.focus:border-accent-blue]="
                !form.controls.email.invalid || !form.controls.email.touched
              "
              [class.focus:ring-accent-blue]="
                !form.controls.email.invalid || !form.controls.email.touched
              "
              style="border-opacity: 0.5; --tw-ring-opacity: 0.5; --tw-border-opacity: 0.5"
            />
            @if (form.controls.email.invalid && form.controls.email.touched) {
              <p class="text-[11px] text-red-500 mt-1.5 ml-1">Introduzca un correo válido</p>
            }
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between ml-1">
            <label
              for="login-password"
              class="text-xs font-semibold text-text-secondary uppercase tracking-wider"
            >
              Contraseña
            </label>
          </div>
          <input
            id="login-password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-surface-900 border rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none transition-all"
            [class.border-red-500]="
              form.controls.password.invalid && form.controls.password.touched
            "
            [class.focus:border-red-500]="
              form.controls.password.invalid && form.controls.password.touched
            "
            [class.focus:ring-1]="form.controls.password.invalid && form.controls.password.touched"
            [class.focus:ring-red-500]="
              form.controls.password.invalid && form.controls.password.touched
            "
            [class.border-surface-600]="
              !form.controls.password.invalid || !form.controls.password.touched
            "
            [class.focus:border-accent-blue]="
              !form.controls.password.invalid || !form.controls.password.touched
            "
            [class.focus:ring-accent-blue]="
              !form.controls.password.invalid || !form.controls.password.touched
            "
            style="border-opacity: 0.5; --tw-ring-opacity: 0.5; --tw-border-opacity: 0.5"
          />
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <p class="text-[11px] text-red-500 mt-1.5 ml-1">La contraseña es obligatoria</p>
          }
        </div>

        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full py-3 text-sm font-bold text-[#09090b] flex items-center justify-center gap-2 bg-text-primary rounded-xl hover:bg-white transition-all active:scale-[0.98] cursor-pointer shadow-lg shadow-white/5 mt-2 disabled:opacity-70 disabled:cursor-not-allowed"
        >
          @if (isLoading()) {
            <app-icon name="loader" extraClass="size-5 animate-spin"></app-icon>
            Iniciando sesión...
          } @else {
            Iniciar Sesión
          }
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="text-sm text-text-secondary">
          ¿No tienes una cuenta?
          <a
            routerLink="/auth/register"
            class="font-bold text-text-primary hover:text-accent-blue transition-colors ml-1"
          >
            Regístrate ahora
          </a>
        </p>
      </div>
    </div>
  </div>
</section>
