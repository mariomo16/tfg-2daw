<div class="bg-surface-card/50 border border-surface-border rounded-sm p-6">
  <div class="mb-8">
    <h2 class="text-xl font-bold text-content-primary">Editar Perfil</h2>
    <p class="text-xs text-content-muted mt-1 uppercase tracking-wider font-medium">
      Actualiza tu información personal
    </p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="grid grid-cols-1 gap-6">
      <div class="space-y-1.5">
        <label
          for="name"
          class="block text-[10px] font-bold text-content-muted uppercase tracking-[0.15em]"
        >
          Nombre Completo
        </label>
        <div class="relative group">
          <input
            id="name"
            type="text"
            formControlName="name"
            class="w-full px-4 py-3.5 bg-zinc-950/50 border border-surface-border rounded-xs text-sm text-content-primary focus:outline-none focus:border-success/50 focus:ring-1 focus:ring-success/20 transition-all placeholder:text-zinc-600"
            placeholder="Introduce tu nombre"
          />
          @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <p class="text-[10px] text-error mt-1.5 font-bold uppercase tracking-wider">
            El nombre es obligatorio
          </p>
          }
        </div>
      </div>

      <div class="space-y-1.5">
        <label
          for="email"
          class="block text-[10px] font-bold text-content-muted uppercase tracking-[0.15em]"
        >
          Dirección de Email
        </label>
        <div class="relative group">
          <input
            id="email"
            type="email"
            formControlName="email"
            class="w-full px-4 py-3.5 bg-zinc-950/50 border border-surface-border rounded-xs text-sm text-content-primary focus:outline-none focus:border-success/50 focus:ring-1 focus:ring-success/20 transition-all placeholder:text-zinc-600"
            placeholder="tu@ejemplo.com"
          />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-[10px] text-error mt-1.5 font-bold uppercase tracking-wider">
            Introduce un email válido
          </p>
          }
        </div>
      </div>

      <div>
        <label for="image" class="block text-sm font-medium text-zinc-300 mb-2">
          Imagen de perfil
        </label>
        <input
          id="image"
          name="image"
          type="file"
          accept="image/*"
          (change)="onImageChange($event)"
          class="w-full px-4 py-2 bg-surface-base/50 border border-surface-border rounded-xs text-sm text-content-primary"
        />
      </div>
    </div>

    <div class="pt-6 flex flex-col sm:flex-row gap-3">
      <button
        type="button"
        (click)="cancel.emit()"
        class="flex-1 px-4 py-3.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs font-bold rounded-xs border border-surface-border transition-all cursor-pointer uppercase tracking-widest"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="form.invalid || isLoading()"
        class="flex-1 px-4 py-3.5 bg-zinc-100 hover:bg-white text-zinc-900 text-xs font-black rounded-xs transition-all disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer uppercase tracking-widest flex items-center justify-center gap-2"
      >
        @if (isLoading()) { Guardando... } @else { Guardar Cambios }
      </button>
    </div>
  </form>
</div>
